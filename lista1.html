<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista 1 de Exercícios</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div>
  <h2>1. Valor da Compra</h2>
  <input type="number" id="qtdCadernos" placeholder="Quantidade de cadernos">
  <button>Calcular</button>
  <div id="res1"></div>
</div>

<hr>

<div>
  <h2>2. Lucro Venda</h2>
  <input type="number" id="qtdCamisetas" placeholder="Quantidade de camisetas">
  <button>Calcular</button>
  <div id="res2"></div>
</div>

<hr>

<div>
  <h2>3. Desconto 10%</h2>
  <input type="number" id="precoOriginal" placeholder="Preço original" step="0.01">
  <button>Calcular</button>
  <div id="res3"></div>
</div>

<hr>

<div>
  <h2>4. Juros Simples</h2>
  <input type="number" id="mesesJS" placeholder="Número de meses">
  <button>Calcular</button>
  <div id="res4"></div>
</div>

<hr>

<div>
  <h2>5. Comissão Vendedor</h2>
  <input type="number" id="totalVendas" placeholder="Total de vendas no mês" step="0.01">
  <button>Calcular</button>
  <div id="res5"></div>
</div>

<hr>

<div>
  <h2>6. Média Semanal</h2>
  <input type="number" id="dia1" placeholder="Vendas Dia 1" step="0.01">
  <input type="number" id="dia2" placeholder="Vendas Dia 2" step="0.01">
  <input type="number" id="dia3" placeholder="Vendas Dia 3" step="0.01">
  <input type="number" id="dia4" placeholder="Vendas Dia 4" step="0.01">
  <input type="number" id="dia5" placeholder="Vendas Dia 5" step="0.01">
  <input type="number" id="dia6" placeholder="Vendas Dia 6" step="0.01">
  <input type="number" id="dia7" placeholder="Vendas Dia 7" step="0.01">
  <button>Calcular</button>
  <div id="res6"></div>
</div>

<hr>

<div>
  <h2>7. Controle Estoque</h2>
  <input type="number" id="qtdVendidaEstoque" placeholder="Quantidade vendida">
  <button>Calcular</button>
  <div id="res7"></div>
</div>

<hr>

<div>
  <h2>8. Aumento 15%</h2>
  <input type="number" id="precoAtual" placeholder="Preço atual" step="0.01">
  <button>Calcular</button>
  <div id="res8"></div>
</div>

<hr>

<div>
  <h2>9. Parcelas</h2>
  <input type="number" id="valorCompraTotal" placeholder="Valor da compra" step="0.01">
  <select id="qtdParcelas">
    <option value="1">1x</option>
    <option value="2">2x</option>
    <option value="3">3x</option>
    <option value="4">4x</option>
    <option value="5" selected>5x</option>
  </select>
  <button>Calcular</button>
  <div id="res9"></div>
</div>

<hr>

<div>
  <h2>10. Juros Compostos</h2>
  <input type="number" id="valorInicialJC" placeholder="Valor inicial" step="0.01">
  <input type="number" id="mesesJC" placeholder="Número de meses">
  <button>Calcular</button>
  <div id="res10"></div>
</div>

</body>
</html>
